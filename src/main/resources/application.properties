# Server Port
server.port=8080

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/photo_review?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Raj@2023#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# SQL Schema/Data Initialization (Runs on Startup)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Custom property for image uploads target folder
file.upload-dir=src/main/resources/static/uploads

# Thymeleaf Template Cache (disable for dev environment hot swapping)
spring.thymeleaf.cache=false

# Security Logging
logging.level.org.springframework.security=INFO
