<div th:replace="~{layout :: layout(~{::content})}">
    <div th:fragment="content">
        <div class="container my-5">
            <h2 class="mb-4">Moderate Comments</h2>

            <!-- Success Banner -->
            <div th:if="${param.success == 'delete'}" class="alert alert-success alert-dismiss-delay" role="alert">
                The comment has been successfully removed from database records!
            </div>

            <div class="card-glass p-4">
                <div class="text-center py-5 text-muted" th:if="${#lists.isEmpty(comments)}">
                    <span style="font-size: 3rem; display: block; margin-bottom: 10px;">💬</span>
                    <p class="mb-0">No comments posted in the system yet.</p>
                </div>

                <div class="table-responsive" th:if="${not #lists.isEmpty(comments)}">
                    <table class="table table-dark table-custom align-middle">
                        <thead>
                            <tr>
                                <th>Photo Details</th>
                                <th>Commenter</th>
                                <th>Comment Text</th>
                                <th>Timestamp</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="comment : ${comments}">
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <img th:src="${comment.photo.imageUrl}" th:alt="${comment.photo.title}" style="width: 50px; height: 38px; object-fit: cover; border-radius: 4px;">
                                        <span class="small fw-bold text-truncate" style="max-width: 150px;" th:text="${comment.photo.title}">Photo title</span>
                                    </div>
                                </td>
                                <td>
                                    <span class="d-block small" th:text="${comment.user.displayName}">Alex Reviewer</span>
                                    <small class="text-muted" th:text="${comment.user.email}">email</small>
                                </td>
                                <td>
                                    <p class="small mb-0 text-white text-wrap" style="max-width: 300px;" th:text="${comment.content}">Comment text.</p>
                                </td>
                                <td class="small text-muted" th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">Date</td>
                                <td>
                                    <form th:action="@{/admin/comments/{id}/delete(id=${comment.id})}" method="post" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this comment as an administrator?');">
                                        <button type="submit" class="btn btn-outline-danger btn-sm">🗑️ Delete</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
