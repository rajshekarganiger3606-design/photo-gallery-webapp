<div th:replace="~{layout :: layout(~{::content})}">
    <div th:fragment="content">
        <div class="container my-5 py-4">
            <div class="row justify-content-center">
                <div class="col-md-7 col-lg-6">
                    <div class="card-glass p-5">
                        <h2 class="text-center mb-4">Create Account</h2>
                        <p class="text-muted text-center mb-5">Register as a photographer or reviewer to join the community.</p>

                        <form th:action="@{/register}" th:object="${user}" method="post">
                            <!-- Display Name -->
                            <div class="mb-4">
                                <label for="displayName" class="form-label form-label-custom">Display Name</label>
                                <input type="text" id="displayName" th:field="*{displayName}" class="form-control form-control-custom" th:errorclass="is-invalid" placeholder="e.g. Jane Doe" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}">
                                    Display name error
                                </div>
                            </div>

                            <!-- Email -->
                            <div class="mb-4">
                                <label for="email" class="form-label form-label-custom">Email Address</label>
                                <input type="email" id="email" th:field="*{email}" class="form-control form-control-custom" th:errorclass="is-invalid" placeholder="you@example.com" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                                    Email validation error
                                </div>
                            </div>

                            <!-- Password -->
                            <div class="mb-4">
                                <label for="password" class="form-label form-label-custom">Password (Min. 6 characters)</label>
                                <input type="password" id="password" th:field="*{password}" class="form-control form-control-custom" th:errorclass="is-invalid" placeholder="Create a secure password" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                                    Password validation error
                                </div>
                            </div>

                            <!-- Confirm Password -->
                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label form-label-custom">Confirm Password</label>
                                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control form-control-custom" th:errorclass="is-invalid" placeholder="Re-enter password" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">
                                    Confirm password error
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary-custom w-100 py-3 mt-3">✦ Join Community</button>
                        </form>

                        <div class="text-center mt-5">
                            <span class="text-muted">Already have an account? </span>
                            <a th:href="@{/login}" style="color: var(--accent-color); font-weight: 500;" class="text-decoration-none">Log In</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
