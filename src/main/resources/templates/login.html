<div th:replace="~{layout :: layout(~{::content})}">
    <div th:fragment="content">
        <div class="container my-5 py-5">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card-glass p-5">
                        <h2 class="text-center mb-4">Welcome Back</h2>
                        <p class="text-muted text-center mb-5">Sign in to rate, comment, and upload your photographs.</p>

                        <!-- Alerts -->
                        <div th:if="${param.error}" class="alert alert-danger alert-dismiss-delay" role="alert">
                            Invalid email or password. Please try again.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-info alert-dismiss-delay" role="alert">
                            You have been successfully logged out.
                        </div>
                        <div th:if="${param.success}" class="alert alert-success alert-dismiss-delay" role="alert">
                            Account created successfully! Please sign in.
                        </div>

                        <!-- Form -->
                        <form th:action="@{/login}" method="post">
                            <!-- Email -->
                            <div class="mb-4">
                                <label for="username" class="form-label form-label-custom">Email Address</label>
                                <input type="email" id="username" name="username" class="form-control form-control-custom" placeholder="you@example.com" required>
                            </div>

                            <!-- Password -->
                            <div class="mb-4">
                                <label for="password" class="form-label form-label-custom">Password</label>
                                <input type="password" id="password" name="password" class="form-control form-control-custom" placeholder="Enter your password" required>
                            </div>

                            <button type="submit" class="btn btn-primary-custom w-100 py-3 mt-3">✦ Sign In</button>
                        </form>

                        <div class="text-center mt-5">
                            <span class="text-muted">Don't have an account? </span>
                            <a th:href="@{/register}" style="color: var(--accent-color); font-weight: 500;" class="text-decoration-none">Sign Up</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
