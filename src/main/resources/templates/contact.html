<div th:replace="~{layout :: layout(~{::content})}">
    <div th:fragment="content">
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-7">
                    <div class="card-glass p-5">
                        <h2 class="mb-4">Get in Touch</h2>
                        <p class="text-muted mb-5">Have questions, feedback, or suggestions about our photo critique platform? Drop us a message.</p>
                        
                        <form onsubmit="alert('Message sent successfully! Thank you for contacting us.'); return false;">
                            <div class="mb-4">
                                <label for="contactName" class="form-label form-label-custom">Full Name</label>
                                <input type="text" id="contactName" class="form-control form-control-custom" placeholder="e.g. John Doe" required>
                            </div>
                            <div class="mb-4">
                                <label for="contactEmail" class="form-label form-label-custom">Email Address</label>
                                <input type="email" id="contactEmail" class="form-control form-control-custom" placeholder="you@example.com" required>
                            </div>
                            <div class="mb-4">
                                <label for="contactMessage" class="form-label form-label-custom">Message</label>
                                <textarea id="contactMessage" class="form-control form-control-custom" rows="5" placeholder="Write your message here..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary-custom w-100 py-3">✦ Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
